
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Basecamp Dashboard</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:#f8fafc;
  color:#1e293b;
}

.cb-ticker{
  display:flex;
  gap:24px;
  padding:8px 20px;
  border-bottom:1px solid #e2e8f0;
  background:#ffffff;
  overflow-x:auto;
}

.cb-body{
  display:grid;
  grid-template-columns:0.88fr 300px 520px;
  gap:20px;
  padding:20px;
}

.cb-row2{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
  padding:0 20px 20px 20px;
}

.cb-panel{
  background:white;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:18px;
}

.cb-panel-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  font-weight:600;
}

.cb-news-panel{
  height:620px;
  display:flex;
  flex-direction:column;
}

#news-list{
  flex:1;
  overflow-y:auto;
}

.cb-news-item{
  display:block;
  text-decoration:none;
  color:inherit;
  padding:10px 0;
  border-bottom:1px solid #f1f5f9;
}

.cb-news-item:hover{
  background:#fffbeb;
  margin:0 -18px;
  padding:10px 18px;
}

.cb-news-headline{
  font-weight:600;
  font-size:14px;
  margin-bottom:6px;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.cb-news-summary{
  font-size:12px;
  color:#64748b;
  margin-bottom:6px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.cb-news-meta{
  font-size:11px;
  color:#94a3b8;
}

.cb-list div{
  padding:8px 0;
  border-bottom:1px solid #f1f5f9;
  font-size:14px;
}
</style>
</head>

<body>

<div class="cb-ticker" id="ticker"></div>

<div class="cb-body">

<div class="cb-panel cb-news-panel">
<div class="cb-panel-title">
<span>주요 크립토 뉴스 (<span id="news-count">0</span>)</span>
<button onclick="loadNews()">↻</button>
</div>
<div id="news-list"></div>
</div>

<div class="cb-panel">
<div class="cb-panel-title">중요 알림</div>
<div id="alerts" class="cb-list"></div>
</div>

<div class="cb-panel">
<div class="cb-panel-title">캘린더</div>
<div id="calendar" class="cb-list"></div>
</div>

</div>

<div class="cb-row2">

<div class="cb-panel">
<div class="cb-panel-title">Crypto Twitter Trends</div>
<div id="trends" class="cb-list"></div>
</div>

<div class="cb-panel">
<div class="cb-panel-title">Airdrop Radar</div>
<div id="airdrops" class="cb-list"></div>
</div>

<div class="cb-panel">
<div class="cb-panel-title">VC Funding</div>
<div id="vc" class="cb-list"></div>
</div>

</div>

<script>

function renderNews(items){
 const list=document.getElementById("news-list")
 document.getElementById("news-count").textContent=items.length

 list.innerHTML=items.map(n=>`
  <a class="cb-news-item" href="${n.url}" target="_blank">
   <div class="cb-news-headline">${n.title}</div>
   <div class="cb-news-summary">${n.summary}</div>
   <div class="cb-news-meta">${n.source}</div>
  </a>
 `).join("")
}

async function loadNews(){
 try{
  const r=await fetch("/.netlify/functions/news")
  const j=await r.json()
  renderNews(j)
 }catch{
  document.getElementById("news-list").innerHTML="뉴스 로드 실패"
 }
}

async function loadTicker(){
 try{
  const r=await fetch("/.netlify/functions/ticker")
  const j=await r.json()

  const map=[["BTC","bitcoin"],["ETH","ethereum"],["SOL","solana"]]

  document.getElementById("ticker").innerHTML=map.map(([s,k])=>{
   const d=j[k]
   if(!d)return ""
   return `<div>${s} $${d.usd}</div>`
  }).join("")
 }catch{}
}

function loadAlerts(){
 const data=[
  "ETF 관련 뉴스 증가",
  "시장 변동성 상승",
  "규제 관련 기사 증가"
 ]

 document.getElementById("alerts").innerHTML=data.map(i=>`<div>${i}</div>`).join("")
}

function loadCalendar(){
 const events=[
  "Token Unlock 예정",
  "프로젝트 메인넷 런치",
  "거래소 상장 예정"
 ]
 document.getElementById("calendar").innerHTML=events.map(e=>`<div>${e}</div>`).join("")
}

function loadTrends(){
 const trends=["BTC ETF","ETH Staking","Solana","AI Tokens","Layer2"]
 document.getElementById("trends").innerHTML=trends.map(t=>`<div>${t}</div>`).join("")
}

function loadAirdrops(){
 const drops=["LayerZero","ZKsync","Scroll","EigenLayer"]
 document.getElementById("airdrops").innerHTML=drops.map(d=>`<div>${d}</div>`).join("")
}

function loadVC(){
 const vc=["a16z 투자","Paradigm 투자","Pantera 투자"]
 document.getElementById("vc").innerHTML=vc.map(v=>`<div>${v}</div>`).join("")
}

loadNews()
loadTicker()
loadAlerts()
loadCalendar()
loadTrends()
loadAirdrops()
loadVC()

</script>

</body>
</html>
